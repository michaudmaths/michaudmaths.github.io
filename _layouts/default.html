<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "fr" }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    <main class="page-content {{ page.page_class | default: '' }}" aria-label="Content">
      {% if page.page_class == "arbre" %}
        {{ content }}
      {% else %}
        <div class="wrapper">
          {{ content }}
        </div>
      {% endif %}
    </main>

    {%- include footer.html -%}

  </body>

</html>
