# Logique et ensembles
  - id: proposition_definition
    label: Définition d'une proposition
    type: definition
    prerequis: []
    description: ""
  - id: quantificateurs
    label: Quantificateurs universel et existentiel
    type: definition
    prerequis: []
    description: ""
  - id: ensemble_definition
    label: Définition d'un ensemble
